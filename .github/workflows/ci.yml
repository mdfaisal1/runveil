name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all modules
        run: |
          go build ./cli/...
          (cd services/api && go build ./...)
          (cd pkg && go build ./...)

      - name: Vet
        run: go vet ./cli/...

      - name: Test
        run: go test ./cli/...
