server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with SPA fallback (Angular client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + health proxied to the Runveil API. ${API_UPSTREAM} is substituted
    # at container start (see Dockerfile CMD) — it becomes a literal here, so
    # no nginx resolver is needed.
    location /v1/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass ${API_UPSTREAM};
    }
}
