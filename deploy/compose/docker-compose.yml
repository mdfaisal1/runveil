name: ${COMPOSE_PROJECT_NAME:-runveil}

networks:
  default:
    name: ${NETWORK_NAME:-runveil-net}
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_conf:
  neo4j_plugins:
  nats_data:

# NOTE: Postgres is intentionally NOT a service here. Runveil uses your
# system-installed PostgreSQL on localhost:5432 (no Docker dependency). This
# compose file only brings up the auxiliary infra (Neo4j, NATS).
# See the README "Local development" section for host Postgres setup.

services:
  neo4j:
    image: neo4j:5.23-community
    container_name: ${COMPOSE_PROJECT_NAME:-runveil}-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      NEO4J_server_http_listen__address: 0.0.0.0:7474
      NEO4J_server_bolt_listen__address: 0.0.0.0:7687
      # uncomment later if you add APOC/etc.
      # NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_conf:/var/lib/neo4j/conf
      - neo4j_plugins:/var/lib/neo4j/plugins
      - ./neo4j/plugins:/plugins:ro
    healthcheck:
      # Neo4j exposes an HTTP server on 7474; a quick GET is enough for health
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 > /dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    labels:
      runveil.role: "graph"

  nats:
    image: nats:2.10-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-runveil}-nats
    restart: unless-stopped
    command: >
      -js
      -sd /data
      -m ${NATS_MONITORING_PORT:-8222}
    ports:
      - "${NATS_PORT:-4222}:4222"          # client connections
      - "${NATS_MONITORING_PORT:-8222}:8222" # HTTP monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      # Check the monitoring endpoint
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/varz | grep -q server_id"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    labels:
      runveil.role: "messaging"
